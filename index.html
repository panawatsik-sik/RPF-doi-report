/* ปีงบประมาณไทย: 1 ต.ค. - 30 ก.ย. เรียกชื่อตามปี พ.ศ. ที่ปีงบประมาณสิ้นสุด */
function currentFiscalYearBE(){
  const now = new Date();
  const month = now.getMonth() + 1; // 1-12
  const gregorianYear = now.getFullYear();
  const fiscalGregorianYear = month >= 10 ? gregorianYear + 1 : gregorianYear;
  return fiscalGregorianYear + 543;
}
function fiscalYearOptions(){
  const current = currentFiscalYearBE();
  const years = [];
  for(let y = current - 1; y <= current + 2; y++){ years.push(y); }
  return years;
}

/* แปลงชื่อ-นามสกุล (ภาษาไทยได้) เป็นอีเมลปลอมสำหรับ Supabase Auth แบบตายตัว (ชื่อเดียวกัน → อีเมลเดียวกันเสมอ)
   ถ้าผู้ใช้พิมพ์อีเมลจริงมา (มี @ อยู่แล้ว เช่น บัญชีเก่าก่อนเปลี่ยนมาใช้ชื่อ) จะใช้ตามที่พิมพ์ ไม่แปลง */
const NAME_LOGIN_DOMAIN = '@doi-app.local';
function normalizeNameForLogin(name){
  return name.trim().replace(/\s+/g, ''); // ตัดช่องว่างหัวท้ายและช่องว่างตรงกลางออกทั้งหมด กันพิมพ์เว้นวรรคไม่ตรงกัน
}
/* แฮชสั้นๆ แบบตายตัว (cyrb53-like) รองรับอักขระไทย ไม่ต้องพึ่งการ lookup ฐานข้อมูลก่อน login */
function hashNameToHex(str){
  let h1 = 0xdeadbeef ^ str.length, h2 = 0x41c6ce57 ^ str.length;
  for(let i=0; i<str.length; i++){
    const ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
  h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
  return (h2>>>0).toString(16).padStart(8,'0') + (h1>>>0).toString(16).padStart(8,'0');
}
function nameToAuthEmail(input){
  const trimmed = input.trim();
  if(trimmed.includes('@')) return trimmed.toLowerCase(); // บัญชีเก่าที่ยังใช้อีเมลจริง
  return 'u' + hashNameToHex(normalizeNameForLogin(trimmed)) + NAME_LOGIN_DOMAIN;
}

/* Storage key ของ Supabase ต้องเป็น ASCII เท่านั้น — ชื่อไฟล์ภาษาไทยหรืออักขระพิเศษทำให้อัปโหลดพังด้วย
   error "Invalid key" จึงต้องตัดเหลือแค่นามสกุลไฟล์ แล้วตั้งชื่อใหม่ให้ไม่ซ้ำด้วยตัวเลขเวลา */
function safeStorageFileName(originalName){
  const extMatch = /\.[a-zA-Z0-9]{1,5}$/.exec(originalName || '');
  const ext = extMatch ? extMatch[0].toLowerCase() : '';
  return `${Date.now()}_${Math.random().toString(36).slice(2,8)}${ext}`;
}

/* อัปโหลดไฟล์หลายไฟล์ขึ้น bucket ที่กำหนด คืนค่าเป็น array ของ public URL
   ถ้าไฟล์ไหนอัปโหลดพลาด จะโยน error พร้อมชื่อไฟล์นั้นออกไปทันที (หยุดที่ไฟล์แรกที่พัง) */
async function uploadMultiplePhotos(files, bucket, folder){
  const urls = [];
  for(const file of files){
    const path = `${folder}/${safeStorageFileName(file.name)}`;
    const { error } = await sb.storage.from(bucket).upload(path, file);
    if(error) throw new Error(`อัปโหลด "${file.name}" ไม่สำเร็จ: ${error.message}`);
    const { data: pub } = sb.storage.from(bucket).getPublicUrl(path);
    urls.push(pub.publicUrl);
  }
  return urls;
}

/* รวมรูปจากคอลัมน์เก่า (photo_url เดี่ยว) กับคอลัมน์ใหม่ (photo_urls หลายรูป) เข้าด้วยกัน
   เผื่อรายงานเก่าก่อนอัปเดตฟีเจอร์นี้ที่มีแค่รูปเดียว */
function allPhotoUrls(report){
  const urls = Array.isArray(report.photo_urls) ? report.photo_urls.filter(Boolean) : [];
  if(report.photo_url && !urls.includes(report.photo_url)) urls.unshift(report.photo_url);
  return urls;
}

function renderPhotoThumbs(report, altText){
  const urls = allPhotoUrls(report);
  if(urls.length === 0) return '—';
  return urls.map(u => `<a href="${u}" target="_blank"><img src="${u}" alt="${altText}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;vertical-align:middle;margin-right:4px;"></a>`).join('');
}

        <option value="station">เจ้าหน้าที่ดอย</option>
        <option value="central">ส่วนกลาง</option>
      </select>
    </div>
    <div class="field" id="suDoiField">
      <label>ดอย</label>
      ${state.doiList.length ? doiSearchFieldHtml('suDoi', null, { includeAll: false }) : '<p class="muted">— ยังไม่มีดอยในระบบ —</p>'}
    </div>
    <button class="btn-primary" style="width:100%;" id="signupBtn">สมัครสมาชิก</button>
    <p class="muted" style="margin-top:10px;">หลังสมัคร บัญชีของคุณจะรอการอนุมัติจากทีมส่วนกลางก่อนใช้งานได้</p>
  `;
  document.getElementById('suRole').onchange = (e) => {
    document.getElementById('suDoiField').style.display = e.target.value === 'central' ? 'none' : 'block';
  };
  document.getElementById('signupBtn').onclick = async () => {
    const full_name = document.getElementById('suName').value.trim();
    const password = document.getElementById('suPassword').value;
    const role = document.getElementById('suRole').value;
    const doi_id = role === 'station' ? resolveDoiIdFromInput('suDoi', false) : null;

    if(!full_name || password.length < 6){
      showAuthMsg('กรุณากรอกข้อมูลให้ครบ (รหัสผ่านอย่างน้อย 6 ตัวอักษร)', true); return;
    }
    if(role === 'station' && !doi_id){
      showAuthMsg('กรุณาเลือกดอยจากรายการที่ค้นหา (พิมพ์แล้วเลือกชื่อดอยให้ตรงจากรายการ)', true); return;
    }
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'กำลังสมัคร...';

    const authEmail = nameToAuthEmail(full_name);
    const { data, error } = await sb.auth.signUp({ email: authEmail, password });
    if(error){
      const msg = /already registered|already exists/i.test(error.message)
        ? 'มีคนใช้ชื่อ-นามสกุลนี้ในระบบแล้ว ถ้าเป็นคนละคนกัน กรุณาเพิ่มข้อมูลต่อท้ายชื่อเพื่อแยกให้ต่างกัน เช่น ใส่ชื่อดอยต่อท้าย'
        : error.message;
      showAuthMsg(msg, true); btn.disabled=false; btn.textContent='สมัครสมาชิก'; return;
    }

    const userId = data.user ? data.user.id : (data.session ? data.session.user.id : null);
    if(userId){
      const { error: profErr } = await sb.from('profiles').insert({
        id: userId, full_name, email: authEmail, role, doi_id, status: 'pending'
      });
      if(profErr){
        const msg = /duplicate key|unique/i.test(profErr.message)
          ? 'มีคนใช้ชื่อ-นามสกุลนี้ในระบบแล้ว กรุณาติดต่อทีมส่วนกลาง'
          : profErr.message;
        showAuthMsg(msg, true); btn.disabled=false; btn.textContent='สมัครสมาชิก'; return;
      }
    }
    btn.disabled = false; btn.textContent = 'สมัครสมาชิก';
    showAuthMsg('สมัครสมาชิกสำเร็จ กรุณารอการอนุมัติจากทีมส่วนกลาง — จำชื่อ-นามสกุลและรหัสผ่านไว้ให้ดี ใช้ login ครั้งต่อไป', false);
  };
}

  document.getElementById('stationPrintBtn').onclick = () => generateStationReport(doiId);

/* ---- Tab: ฤดูกาล / ประมาณการ / ยอดส่งรายสัปดาห์ ---- */
/* วันอังคารล่าสุด (รวมวันนี้ถ้าวันนี้คือวันอังคาร) — ใช้ตั้งค่าเริ่มต้นให้ฟอร์มยอดส่งรายสัปดาห์ */
function getLastTuesdayISO(){
  const d = new Date();
  const day = d.getDay(); // 0=อาทิตย์, 1=จันทร์, 2=อังคาร, ...
  const diff = (day - 2 + 7) % 7;
  d.setDate(d.getDate() - diff);
  return d.toISOString().slice(0,10);
}

/* ---- Tab: ประมาณการผลผลิต (เปิดฤดูกาลใหม่ + แก้ไขประมาณการ) — ทำนานๆ ครั้ง ปีละ 2-3 ครั้ง ---- */
async function renderEstimateTab(container, doiId){
  const fruits = await getFruitTypes(doiId);
  const { data: seasons } = await sb.from('seasons')
    .select('*, fruit_types(name), weekly_shipments(quantity), season_revisions(id, previous_estimated_yield, new_estimated_yield, reason, created_at, profiles(full_name)), profiles!acknowledged_by(full_name)')
    .eq('doi_id', doiId).order('created_at', { ascending: false });

  const fruitOptions = fruits.map(f => `<option value="${f.id}">${f.name}</option>`).join('');

  const fruitNamesInDoi = fruits.map(f => f.name);
  let varietiesByFruit = {};
  if(fruitNamesInDoi.length > 0){
    const { data: varietyRows } = await sb.from('fruit_varieties').select('fruit_name, variety_name').in('fruit_name', fruitNamesInDoi);
    (varietyRows||[]).forEach(v => {
      if(!varietiesByFruit[v.fruit_name]) varietiesByFruit[v.fruit_name] = [];
      varietiesByFruit[v.fruit_name].push(v.variety_name);
    });
  }
  function varietyFieldHtmlFor(fruitId){
    const fruit = fruits.find(f => String(f.id) === String(fruitId));
    const list = (fruit && varietiesByFruit[fruit.name]) || [];
    return varietySearchFieldHtml('newSeasonVariety', list, null, { includeAll: false });
  }

  container.innerHTML = `
    <div class="card">
      <h3>เปิดฤดูกาลใหม่ / ตั้งประมาณการผลผลิต</h3>
      <p class="muted">ทำเป็นครั้งคราว (ปีละ 2-3 ครั้งต่อฤดูกาล) — ถ้าต้องการกรอกยอดส่งรายสัปดาห์ ไปที่แท็บ "ยอดส่งรายสัปดาห์" แทน</p>
      <div id="seasonMsg"></div>
      <div class="grid-2">
        <div class="field"><label>ชนิดผลไม้</label><select id="newSeasonFruit">${fruitOptions}</select></div>
        <div class="field"><label>พันธุ์ (ถ้ามี)</label><div id="newSeasonVarietyWrap">${varietyFieldHtmlFor(fruits[0] ? fruits[0].id : null)}</div></div>
        <div class="field"><label>ปีงบประมาณ</label><select id="newSeasonLabel">${fiscalYearOptions().map(y => `<option value="${y}" ${y===currentFiscalYearBE()?'selected':''}>ปีงบประมาณ ${y}</option>`).join('')}</select></div>
        <div class="field"><label>ประมาณการผลผลิต (กก.)</label><input type="number" step="0.01" id="newSeasonEst"></div>
        <div class="field"><label>วันที่คาดว่าจะเก็บเกี่ยว</label><input type="date" id="newSeasonHarvest"></div>
      </div>
      <p class="muted">ถ้ายังไม่เห็นพันธุ์ที่ต้องการในรายการ ให้แจ้งทีมส่วนกลางเพิ่มผ่านหน้า "จัดการพันธุ์" ก่อน (ป้องกันชื่อพันธุ์สะกดไม่ตรงกันข้ามดอย)</p>
      <button class="btn-primary" id="createSeasonBtn">เปิดฤดูกาล</button>
    </div>
    <div id="seasonList"></div>
  `;

  document.getElementById('newSeasonFruit').onchange = (e) => {
    document.getElementById('newSeasonVarietyWrap').innerHTML = varietyFieldHtmlFor(e.target.value);
  };

  document.getElementById('createSeasonBtn').onclick = async () => {
    const fruit_type_id = document.getElementById('newSeasonFruit').value;
    const variety_name = resolveVarietyFromInput('newSeasonVariety', false);
    const year_label = document.getElementById('newSeasonLabel').value.trim();
    const estimated_yield = parseFloat(document.getElementById('newSeasonEst').value) || null;
    const expected_harvest_date = document.getElementById('newSeasonHarvest').value || null;
    if(!fruit_type_id || !year_label){
      document.getElementById('seasonMsg').innerHTML = `<div class="msg msg-error">กรุณาเลือกชนิดผลไม้และใส่ชื่อฤดูกาล</div>`;
      return;
    }
    const { error } = await sb.from('seasons').insert({
      doi_id: doiId, fruit_type_id, variety_name, year_label, estimated_yield, expected_harvest_date, created_by: state.profile.id
    });
    if(error){ document.getElementById('seasonMsg').innerHTML = `<div class="msg msg-error">${error.message}</div>`; return; }
    renderEstimateTab(container, doiId);
  };

  const listEl = document.getElementById('seasonList');
  if(!seasons || seasons.length === 0){
    listEl.innerHTML = `<div class="empty">ยังไม่มีฤดูกาลที่เปิดไว้</div>`;
    return;
  }
  listEl.innerHTML = seasons.map(s => {
    const totalShipped = (s.weekly_shipments||[]).reduce((sum,w)=>sum+Number(w.quantity),0);

    const revisions = (s.season_revisions||[]).sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
    const revisionRows = revisions.map(r => `<tr>
        <td>${new Date(r.created_at).toLocaleDateString('th-TH')}</td>
        <td>${r.previous_estimated_yield!=null ? Number(r.previous_estimated_yield).toLocaleString() : '—'} → ${Number(r.new_estimated_yield).toLocaleString()} กก.</td>
        <td class="muted">${r.reason}</td>
        <td class="muted">${r.profiles ? r.profiles.full_name : ''}</td>
      </tr>`).join('');

    const editorOpen = openEstimateEditors.has(s.id);

    return `
      <div class="season-block">
        <div class="head">
          <div><strong>${s.fruit_types.name}${s.variety_name ? ` (${s.variety_name})` : ''}</strong> — ปีงบประมาณ ${s.year_label}
            <span class="badge ${s.status==='open'?'badge-green':'badge-gray'}">${s.status==='open'?'กำลังดำเนินการ':'ปิดฤดูกาล'}</span>
          </div>
          <div class="muted">ประมาณการ: ${s.estimated_yield ? Number(s.estimated_yield).toLocaleString()+' กก.' : '—'} &nbsp;|&nbsp; ส่งแล้วรวม (จากยอดรายสัปดาห์): ${totalShipped.toLocaleString()} กก.</div>
          <div style="margin-top:6px;">
            ${s.acknowledged_at
              ? `<span class="badge badge-green">ส่วนกลางรับทราบแล้ว โดย ${s.profiles ? s.profiles.full_name : ''} เมื่อ ${new Date(s.acknowledged_at).toLocaleString('th-TH')}</span>`
              : `<span class="badge badge-gray">ส่วนกลางยังไม่รับทราบ</span>`}
          </div>
        </div>

        <button class="btn-ghost" data-toggle-estimate="${s.id}" style="padding:4px 0; color:var(--pine);">
          ${editorOpen ? 'ยกเลิกการแก้ไขประมาณการ' : 'แก้ไขประมาณการ'}
        </button>

        ${editorOpen ? `
          <div style="background:var(--pine-light); border-radius:8px; padding:12px; margin:10px 0;">
            <div class="grid-2">
              <div class="field"><label>ประมาณการใหม่ (กก.)</label><input type="number" step="0.01" id="est-new-${s.id}" value="${s.estimated_yield||''}"></div>
            </div>
            <div class="field"><label>เหตุผลที่ปรับแก้ (จำเป็นต้องระบุ)</label><textarea id="est-reason-${s.id}" rows="2" placeholder="เช่น เจอลูกเห็บทำให้ผลร่วง คาดว่าผลผลิตจะลดลงจากที่ประมาณการไว้เดิม"></textarea></div>
            <div id="est-msg-${s.id}"></div>
            <button class="btn-primary" data-save-estimate="${s.id}">บันทึกการแก้ไข</button>
          </div>
        ` : ''}

        ${revisionRows ? `
          <details style="margin: 10px 0;">
            <summary class="muted" style="cursor:pointer;">ประวัติการแก้ไขประมาณการ (${revisions.length})</summary>
            <table style="margin-top:8px;">
              <thead><tr><th>วันที่</th><th>เปลี่ยนจาก → เป็น</th><th>เหตุผล</th><th>ผู้แก้ไข</th></tr></thead>
              <tbody>${revisionRows}</tbody>
            </table>
          </details>
        ` : ''}
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('button[data-toggle-estimate]').forEach(btn => {
    btn.onclick = () => {
      const seasonId = Number(btn.dataset.toggleEstimate);
      if(openEstimateEditors.has(seasonId)) openEstimateEditors.delete(seasonId);
      else openEstimateEditors.add(seasonId);
      renderEstimateTab(container, doiId);
    };
  });

  listEl.querySelectorAll('button[data-save-estimate]').forEach(btn => {
    btn.onclick = async () => {
      const seasonId = btn.dataset.saveEstimate;
      const newVal = parseFloat(document.getElementById(`est-new-${seasonId}`).value);
      const reason = document.getElementById(`est-reason-${seasonId}`).value.trim();
      const msgEl = document.getElementById(`est-msg-${seasonId}`);
      if(isNaN(newVal)){
        msgEl.innerHTML = `<div class="msg msg-error">กรุณาใส่ตัวเลขประมาณการใหม่</div>`; return;
      }
      if(!reason){
        msgEl.innerHTML = `<div class="msg msg-error">กรุณาระบุเหตุผลที่ปรับแก้ประมาณการ</div>`; return;
      }
      const season = seasons.find(s => String(s.id) === String(seasonId));
      const { error } = await sb.from('season_revisions').insert({
        season_id: seasonId,
        previous_estimated_yield: season ? season.estimated_yield : null,
        new_estimated_yield: newVal,
        reason,
        revised_by: state.profile.id
      });
      if(error){ msgEl.innerHTML = `<div class="msg msg-error">${error.message}</div>`; return; }
      const { error: updateErr } = await sb.from('seasons').update({ estimated_yield: newVal }).eq('id', seasonId);
      if(updateErr){ msgEl.innerHTML = `<div class="msg msg-error">${updateErr.message}</div>`; return; }
      openEstimateEditors.delete(Number(seasonId));
      renderEstimateTab(container, doiId);
    };
  });
}

/* ---- Tab: ยอดส่งรายสัปดาห์ — ทำทุกวันอังคาร ออกแบบให้กรอกเร็วที่สุด ---- */
async function renderWeeklyTab(container, doiId){
  const filters = state.stationWeeklyFilters;
  const fruits = await getFruitTypes(doiId);

  const { data: openSeasonsRaw } = await sb.from('seasons')
    .select('id, year_label, variety_name, fruit_types(name)')
    .eq('doi_id', doiId).eq('status', 'open').order('created_at', { ascending: false });

  const openSeasons = (openSeasonsRaw||[]).filter(s =>
    (filters.fruit === 'all' || s.fruit_types.name === filters.fruit) &&
    (filters.variety === 'all' || (s.variety_name || '') === filters.variety)
  );

  const fruitOptionsHtml = `<option value="all">ทุกชนิดพืช</option>` +
    fruits.map(f => `<option value="${f.name}" ${filters.fruit===f.name?'selected':''}>${f.name}</option>`).join('');

  let varietyRowsQuery = sb.from('fruit_varieties').select('variety_name').order('variety_name');
  if(filters.fruit !== 'all') varietyRowsQuery = varietyRowsQuery.eq('fruit_name', filters.fruit);
  const { data: varietyRows } = await varietyRowsQuery;
  const varietyNames = Array.from(new Set((varietyRows||[]).map(v => v.variety_name)));

  const seasonOptions = openSeasons.map(s =>
    `<option value="${s.id}">${s.fruit_types.name}${s.variety_name ? ` (${s.variety_name})` : ''} — ปีงบประมาณ ${s.year_label}</option>`
  ).join('');

  const openSeasonIds = openSeasons.map(s => s.id);
  const { data: recentShipments } = await sb.from('weekly_shipments')
    .select('id, week_start_date, quantity, note, created_at, acknowledged_at, seasons(fruit_types(name), variety_name, year_label), profiles!reported_by(full_name), ack_profile:profiles!acknowledged_by(full_name)')
    .in('season_id', openSeasonIds.length ? openSeasonIds : [0])
    .order('week_start_date', { ascending: false })
    .limit(20);

  // สถานะการส่งข้อมูลของสัปดาห์นี้ (ทุกฤดูกาลที่เปิดอยู่ ไม่ขึ้นกับตัวกรอง เพื่อให้เห็นภาพรวมทั้งทีม)
  const thisWeek = getLastTuesdayISO();
  const allOpenSeasonIds = (openSeasonsRaw||[]).map(s => s.id);
  const { data: thisWeekShipments } = await sb.from('weekly_shipments')
    .select('season_id, created_at, profiles!reported_by(full_name)')
    .eq('week_start_date', thisWeek)
    .in('season_id', allOpenSeasonIds.length ? allOpenSeasonIds : [0]);
  const submittedBySeasonId = {};
  (thisWeekShipments||[]).forEach(w => { submittedBySeasonId[w.season_id] = w; });

  container.innerHTML = `
    <div class="card">
      <h3>ตัวกรอง</h3>
      <div class="grid-2">
        <div class="field"><label>ชนิดพืช</label><select id="wkFilterFruit">${fruitOptionsHtml}</select></div>
        <div class="field"><label>พันธุ์</label>${varietySearchFieldHtml('wkFilterVariety', varietyNames, filters.variety, { includeAll: true })}</div>
      </div>
    </div>
    <div class="card">
      <h3>บันทึกยอดส่งรายสัปดาห์</h3>
      <p class="muted">กรอกทุกวันอังคาร — เลือกฤดูกาลที่กำลังดำเนินการ แล้วใส่ปริมาณที่ส่งในสัปดาห์นี้</p>
      <div id="weeklyMsg"></div>
      ${openSeasons.length === 0 ? `
        <div class="empty">ไม่มีฤดูกาลที่เปิดอยู่ตรงกับตัวกรองนี้</div>
      ` : `
        <div class="field"><label>ฤดูกาล (ชนิดผลไม้ / พันธุ์)</label><select id="wkSeasonSelect">${seasonOptions}</select></div>
        <div class="grid-2">
          <div class="field"><label>สัปดาห์ที่เริ่ม (วันที่)</label><input type="date" id="wkDate" value="${getLastTuesdayISO()}"></div>

      <table>

  };
  document.getElementById('wkFilterVariety').onchange = () => {
    state.stationWeeklyFilters.variety = resolveVarietyFromInput('wkFilterVariety', true);
    renderWeeklyTab(container, doiId);
  };

  const saveBtn = document.getElementById('saveWeeklyBtn');
  if(saveBtn){
    saveBtn.onclick = async () => {
      const season_id = document.getElementById('wkSeasonSelect').value;
      const week_start_date = document.getElementById('wkDate').value;
      const quantity = parseFloat(document.getElementById('wkQty').value);
      const note = document.getElementById('wkNote').value.trim();
      if(!week_start_date || isNaN(quantity)){
        document.getElementById('weeklyMsg').innerHTML = `<div class="msg msg-error">กรุณาใส่วันที่และปริมาณให้ครบ</div>`;
        return;
      }
      saveBtn.disabled = true; saveBtn.textContent = 'กำลังบันทึก...';
      const { error } = await sb.from('weekly_shipments').insert({
        season_id, week_start_date, quantity, note, reported_by: state.profile.id
      });
      saveBtn.disabled = false; saveBtn.textContent = 'บันทึกยอดส่งสัปดาห์นี้';
      if(error){ document.getElementById('weeklyMsg').innerHTML = `<div class="msg msg-error">${error.message}</div>`; return; }
      renderWeeklyTab(container, doiId);
    };
  }
}

/* ---- Tab: สถานะการเจริญเติบโต ---- */
async function renderGrowthTab(container, doiId){
  const fruits = await getFruitTypes(doiId);
  const { data: reports } = await sb.from('growth_reports')
    .select('*, fruit_types(name)').eq('doi_id', doiId).order('created_at', { ascending: false }).limit(30);

  const fruitOptions = fruits.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
  const stageOptions = GROWTH_STAGES.map(s => `<option value="${s}">${s}</option>`).join('');

  // ดึงพันธุ์ทั้งหมดที่เกี่ยวข้องกับชนิดผลไม้ของดอยนี้ มาไว้ให้เลือก
  const fruitNamesInDoi = fruits.map(f => f.name);
  let varietiesByFruit = {};
  if(fruitNamesInDoi.length > 0){
    const { data: varietyRows } = await sb.from('fruit_varieties').select('fruit_name, variety_name').in('fruit_name', fruitNamesInDoi);
    (varietyRows||[]).forEach(v => {
      if(!varietiesByFruit[v.fruit_name]) varietiesByFruit[v.fruit_name] = [];
      varietiesByFruit[v.fruit_name].push(v.variety_name);
    });
  }
  function varietyFieldHtmlFor(fruitId){
    const fruit = fruits.find(f => String(f.id) === String(fruitId));
    const list = (fruit && varietiesByFruit[fruit.name]) || [];
    return varietySearchFieldHtml('growthVariety', list, null, { includeAll: false });
  }

  container.innerHTML = `
    <div class="card">
      <h3>รายงานสถานะการเจริญเติบโต</h3>
      <div id="growthMsg"></div>
      <div class="grid-2">
        <div class="field"><label>ชนิดผลไม้</label><select id="growthFruit">${fruitOptions}</select></div>
        <div class="field"><label>พันธุ์ (ถ้ามี)</label><div id="growthVarietyWrap">${varietyFieldHtmlFor(fruits[0] ? fruits[0].id : null)}</div></div>
        <div class="field"><label>สถานะ</label><select id="growthStatus">${stageOptions}</select></div>
      </div>
      <div class="field"><label>หมายเหตุเพิ่มเติม (ถ้ามี)</label><textarea id="growthNote" rows="2" placeholder="เช่น ติดดอก 30% เจอน้ำค้างแข็งบางส่วน"></textarea></div>
      <div class="field"><label>แนบรูปภาพ (แนบได้หลายรูป)</label><input type="file" id="growthPhoto" accept="image/*" multiple></div>
      <button class="btn-primary" id="saveGrowthBtn">บันทึกรายงาน</button>
    </div>
    <div class="card">
      <h3>ประวัติรายงานล่าสุด</h3>
      <table>
        <thead><tr><th>วันที่</th><th>ชนิดผลไม้</th><th>สถานะ</th><th>หมายเหตุ</th><th>รูป</th></tr></thead>
        <tbody>
          ${(reports||[]).map(r => `<tr><td>${new Date(r.created_at).toLocaleDateString('th-TH')}</td><td>${r.fruit_types.name}${r.variety_name ? ` (${r.variety_name})` : ''}</td><td><span class="badge badge-green">${r.status}</span></td><td class="muted">${r.note||''}</td><td>${renderPhotoThumbs(r, 'รูปสถานะการเจริญเติบโต')}</td></tr>`).join('') || '<tr><td colspan="5" class="muted">ยังไม่มีรายงาน</td></tr>'}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('growthFruit').onchange = (e) => {
    document.getElementById('growthVarietyWrap').innerHTML = varietyFieldHtmlFor(e.target.value);
  };

  document.getElementById('saveGrowthBtn').onclick = async () => {
    const btn = document.getElementById('saveGrowthBtn');
    const fruit_type_id = document.getElementById('growthFruit').value;
    const variety_name = resolveVarietyFromInput('growthVariety', false);
    const status = document.getElementById('growthStatus').value;
    const note = document.getElementById('growthNote').value.trim();
    const fileInput = document.getElementById('growthPhoto');
    if(!fruit_type_id){ document.getElementById('growthMsg').innerHTML = `<div class="msg msg-error">กรุณาเลือกชนิดผลไม้</div>`; return; }

    btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

    let photo_urls = [];
    if(fileInput.files && fileInput.files.length > 0){
      try{
        photo_urls = await uploadMultiplePhotos(Array.from(fileInput.files), 'growth-photos', doiId);
      } catch(uploadErr){
        document.getElementById('growthMsg').innerHTML = `<div class="msg msg-error">${uploadErr.message}</div>`;
        btn.disabled = false; btn.textContent = 'บันทึกรายงาน'; return;
      }
    }

    const { error } = await sb.from('growth_reports').insert({
      doi_id: doiId, fruit_type_id, variety_name, status, note, photo_urls, reported_by: state.profile.id
    });
    btn.disabled = false; btn.textContent = 'บันทึกรายงาน';
    if(error){ document.getElementById('growthMsg').innerHTML = `<div class="msg msg-error">${error.message}</div>`; return; }
    renderGrowthTab(container, doiId);
  };
}

/* ---- Tab: แดชบอร์ดของดอย (สรุปข้อมูลเฉพาะดอยตัวเอง) ---- */
async function renderStationDashboardTab(container, doiId){
  container.innerHTML = `<div class="card"><div class="empty">กำลังโหลด...</div></div>`;

  const filters = state.stationDashboardFilters;
  const fruits = await getFruitTypes(doiId);

  const fruitOptionsHtml = `<option value="all">ทุกชนิดพืช</option>` +
    fruits.map(f => `<option value="${f.name}" ${filters.fruit===f.name?'selected':''}>${f.name}</option>`).join('');

  let varietyRowsQuery = sb.from('fruit_varieties').select('variety_name').order('variety_name');
  if(filters.fruit !== 'all') varietyRowsQuery = varietyRowsQuery.eq('fruit_name', filters.fruit);
  const { data: varietyRows } = await varietyRowsQuery;
  const varietyNames = Array.from(new Set((varietyRows||[]).map(v => v.variety_name)));

  const [{ data: growthRaw }, { data: seasonsRawAll }, { data: disastersRaw }] = await Promise.all([
    sb.from('growth_reports').select('*, fruit_types(name)').eq('doi_id', doiId).order('created_at', { ascending: false }),
    sb.from('seasons').select('*, fruit_types(name), weekly_shipments(quantity, week_start_date)').eq('doi_id', doiId).eq('status', 'open'),
    sb.from('disaster_reports').select('*, fruit_types(name)').eq('doi_id', doiId).order('created_at', { ascending: false })
  ]);

  const matchesFilter = (fruitName, varietyName) =>
    (filters.fruit === 'all' || fruitName === filters.fruit) &&
    (filters.variety === 'all' || (varietyName || '') === filters.variety);
  const matchesFruitOnly = (fruitName) => filters.fruit === 'all' || fruitName === filters.fruit;

  const growth = (growthRaw||[]).filter(g => matchesFilter(g.fruit_types.name, g.variety_name));
  const seasonsRaw = (seasonsRawAll||[]).filter(s => matchesFilter(s.fruit_types.name, s.variety_name));
  // รายงานภัยพิบัติไม่มีข้อมูลพันธุ์ให้กรอง จึงกรองแค่ตามชนิดพืช — ที่ไม่ระบุชนิด (กระทบทั้งดอย) จะแสดงเสมอ
  const disasters = (disastersRaw||[]).filter(d => !d.fruit_type_id || matchesFruitOnly(d.fruit_types ? d.fruit_types.name : null)).slice(0, 5);

  const latestGrowthByFruit = {};
  growth.forEach(g => {
    if(!latestGrowthByFruit[g.fruit_type_id]) latestGrowthByFruit[g.fruit_type_id] = g;
  });
  const growthList = Object.values(latestGrowthByFruit);

  const newDisasterCount = disasters.filter(d => d.status === 'new').length;
  const now = new Date();
  const weekTotal = seasonsRaw.reduce((sum, s) => {
    return sum + (s.weekly_shipments||[]).filter(w => {
      const d = new Date(w.week_start_date);
      const diffDays = (now - d) / (1000*60*60*24);
      return diffDays >= 0 && diffDays <= 7;
    }).reduce((wsum,w)=>wsum+Number(w.quantity),0);
  }, 0);
  const totalEstimate = seasonsRaw.reduce((sum,s)=>sum+Number(s.estimated_yield||0), 0);
  const totalShipped = seasonsRaw.reduce((sum,s)=>sum+(s.weekly_shipments||[]).reduce((wsum,w)=>wsum+Number(w.quantity),0), 0);

  container.innerHTML = `
    <div class="card">
      <h3>ตัวกรอง</h3>
      <div class="grid-2">
        <div class="field"><label>ชนิดพืช</label><select id="dashFilterFruit">${fruitOptionsHtml}</select></div>
        <div class="field"><label>พันธุ์</label>${varietySearchFieldHtml('dashFilterVariety', varietyNames, filters.variety, { includeAll: true })}</div>
      </div>
    </div>

    <div class="card">
      <div class="rpt-stats" style="margin:0;">
        <div class="rpt-stat"><div class="num">${seasonsRaw.length}</div><div class="lbl">ฤดูกาลที่กำลังดำเนินการ</div></div>
        <div class="rpt-stat"><div class="num">${totalEstimate.toLocaleString()}</div><div class="lbl">ประมาณการรวม (กก.)</div></div>
        <div class="rpt-stat"><div class="num">${totalShipped.toLocaleString()}</div><div class="lbl">ส่งแล้วรวม (กก.)</div></div>
        <div class="rpt-stat"><div class="num">${weekTotal.toLocaleString()}</div><div class="lbl">ส่ง 7 วันล่าสุด (กก.)</div></div>
        <div class="rpt-stat"><div class="num">${newDisasterCount}</div><div class="lbl">ภัยพิบัติรอรับทราบ</div></div>
      </div>
    </div>

    <div class="card">
      <h3>สถานะการเจริญเติบโตล่าสุด</h3>
      <table>
        <thead><tr><th>ชนิดผลไม้</th><th>สถานะ</th><th>หมายเหตุ</th></tr></thead>
        <tbody>
          ${growthList.map(g => `<tr><td>${g.fruit_types.name}${g.variety_name ? ` (${g.variety_name})` : ''}</td><td><span class="badge badge-green">${g.status}</span></td><td class="muted">${g.note||''}</td></tr>`).join('') || '<tr><td colspan="3" class="muted">ไม่มีข้อมูลตรงกับตัวกรองนี้</td></tr>'}
        </tbody>
      </table>
    </div>

    <div class="card">
      <h3>แนวโน้มผลผลิตของดอยนี้</h3>
      <canvas id="stationChart" height="110"></canvas>
    </div>

    <div class="card">
      <h3>รายงานภัยพิบัติล่าสุด</h3>
      <table>
        <thead><tr><th>วันที่</th><th>ประเภท</th><th>พื้นที่</th><th>สถานะ</th></tr></thead>
        <tbody>

/* ============================================================
   ช่องค้นหาแบบพิมพ์กรอง (ใช้ <input list> + <datalist> ของเบราว์เซอร์เอง)
   ใช้แทน <select> ตรงจุดที่มีตัวเลือกเยอะ (ดอย, พันธุ์) ให้พิมพ์ค้นหาได้แทนการกดเลื่อนหา
   ============================================================ */
function doiSearchFieldHtml(inputId, selectedDoiId, opts){
  opts = opts || {};
  const dlId = inputId + 'Dl';
  const items = state.doiList.map(d => `<option value="${d.name}">`).join('');
  let currentVal = '';
  if(selectedDoiId && selectedDoiId !== 'all'){
    const match = state.doiList.find(d => String(d.id) === String(selectedDoiId));
    currentVal = match ? match.name : '';
  }
  const placeholder = opts.includeAll ? 'ทุกดอย — พิมพ์ค้นหาชื่อดอย...' : 'พิมพ์ค้นหาชื่อดอย...';
  return `<input type="text" id="${inputId}" list="${dlId}" value="${currentVal}" placeholder="${placeholder}" autocomplete="off">
    <datalist id="${dlId}">${items}</datalist>`;
}
/* คืนค่า doi_id (string) ที่ตรงกับข้อความที่พิมพ์ไว้ในช่องค้นหา — ถ้าไม่พบและ includeAll เปิดอยู่ จะคืน 'all', ถ้าปิดอยู่จะคืน null */
function resolveDoiIdFromInput(inputId, includeAll){
  const el = document.getElementById(inputId);
  const val = el ? el.value.trim() : '';
  if(!val) return includeAll ? 'all' : null;
  const match = state.doiList.find(d => d.name === val);
  return match ? String(match.id) : (includeAll ? 'all' : null);
}

function varietySearchFieldHtml(inputId, varietyNames, selectedValue, opts){
  opts = opts || {};
  const dlId = inputId + 'Dl';
  const items = varietyNames.map(n => `<option value="${n}">`).join('');
  const currentVal = (selectedValue && selectedValue !== 'all') ? selectedValue : '';
  const placeholder = opts.includeAll ? 'ทุกพันธุ์ — พิมพ์ค้นหา...' : 'พิมพ์ค้นหาพันธุ์... (เว้นว่าง = ไม่ระบุ)';
  return `<input type="text" id="${inputId}" list="${dlId}" value="${currentVal}" placeholder="${placeholder}" autocomplete="off">
    <datalist id="${dlId}">${items}</datalist>`;
}
/* คืนค่าข้อความพันธุ์ที่พิมพ์ไว้ — ถ้าเว้นว่างและ includeAll เปิดอยู่ จะคืน 'all', ถ้าปิดอยู่จะคืน null (ไม่ระบุพันธุ์) */
function resolveVarietyFromInput(inputId, includeAll){
  const el = document.getElementById(inputId);
  const val = el ? el.value.trim() : '';
  if(!val) return includeAll ? 'all' : null;
  return val;
}

async function getAllFruitNames(){
  const { data } = await sb.from('fruit_types').select('name');
  const names = Array.from(new Set((data||[]).map(f => f.name)));
  names.sort((a,b) => a.localeCompare(b, 'th'));
  return names;
}

/* รวบรวมข้อมูลสรุปต่อดอย (ภัยพิบัติล่าสุด, สถานะการเจริญเติบโตล่าสุดต่อชนิดพืช, ยอดส่ง 7 วันล่าสุด)
   สำหรับแสดงในป๊อปอัพของแผนที่ */
async function fetchMapSummary(fruitFilter){
  const [{ data: disasters }, { data: growth }, { data: seasonsRaw }] = await Promise.all([
    sb.from('disaster_reports').select('doi_id, fruit_type_id, disaster_type, status, created_at, fruit_types(name)').order('created_at', { ascending: false }),
    sb.from('growth_reports').select('doi_id, fruit_type_id, status, created_at, fruit_types(name)').order('created_at', { ascending: false }),
    sb.from('seasons').select('doi_id, fruit_types(name), weekly_shipments(quantity, week_start_date)').eq('status','open')
  ]);

  const summary = {};
  function ensure(doiId){
    if(!summary[doiId]) summary[doiId] = { alert: false, lastDisaster: null, growthList: [], weekTotal: 0 };
    return summary[doiId];
  }

  (disasters||[]).forEach(d => {
    const matchesFilter = fruitFilter === 'all' || d.fruit_type_id === null || (d.fruit_types && d.fruit_types.name === fruitFilter);
    if(!matchesFilter) return;
    const s = ensure(d.doi_id);
    if(d.status === 'new') s.alert = true;
    if(!s.lastDisaster) s.lastDisaster = d;
  });

  const seenGrowthKeys = new Set();
  (growth||[]).forEach(g => {
    if(fruitFilter !== 'all' && g.fruit_types.name !== fruitFilter) return;
    const key = `${g.doi_id}-${g.fruit_type_id}`;
    if(seenGrowthKeys.has(key)) return;
    seenGrowthKeys.add(key);
    const s = ensure(g.doi_id);
    s.growthList.push({ fruit: g.fruit_types.name, status: g.status });
  });

  (seasonsRaw||[]).forEach(se => {
    if(fruitFilter !== 'all' && se.fruit_types.name !== fruitFilter) return;
    const s = ensure(se.doi_id);
    const now = new Date();
    (se.weekly_shipments||[]).forEach(w => {
      const d = new Date(w.week_start_date);
      const diffDays = (now - d) / (1000*60*60*24);
      if(diffDays >= 0 && diffDays <= 7) s.weekTotal += Number(w.quantity);
    });
  });

  return summary;
}

function buildDoiPopupHtml(d, s){
  const parts = [`<strong>${d.name}</strong><br><span style="color:#666;">${d.province||''}</span>`];
  if(s && s.alert){
    parts.push(`<br><span style="color:#B84B32;">⚠ มีรายงานภัยพิบัติใหม่ (${s.lastDisaster ? s.lastDisaster.disaster_type : ''})</span>`);
  } else if(s && s.lastDisaster){
    parts.push(`<br><span style="color:#888; font-size:12px;">ภัยพิบัติล่าสุด: ${s.lastDisaster.disaster_type} (${s.lastDisaster.status==='resolved'?'แก้ไขแล้ว':'รับทราบแล้ว'})</span>`);
  }
  if(s && s.growthList.length > 0){
    parts.push('<br><div style="margin-top:4px; font-size:12.5px;">' +
      s.growthList.map(g => `${g.fruit}: <strong>${g.status}</strong>`).join('<br>') +
      '</div>');
  }
  if(s && s.weekTotal > 0){
    parts.push(`<br><span style="font-size:12.5px;">ส่งแล้วสัปดาห์นี้: <strong>${s.weekTotal.toLocaleString()} กก.</strong></span>`);
  }
  if(!s || (s.growthList.length === 0 && s.weekTotal === 0 && !s.lastDisaster)){
    parts.push('<br><span style="color:#888; font-size:12px;">ยังไม่มีข้อมูลรายงาน</span>');
  }
  return parts.join('');
}

async function refreshMapMarkers(fruitFilter){
  if(!mapInstance || !mapMarkersLayer) return;
  const summary = await fetchMapSummary(fruitFilter);

  mapMarkersLayer.clearLayers();
  state.doiList.forEach(d => {
    if(d.latitude == null || d.longitude == null) return;
    const s = summary[d.id];
    const isAlert = !!(s && s.alert);
    const marker = L.circleMarker([d.latitude, d.longitude], {
      radius: 9,
      fillColor: isAlert ? '#B84B32' : '#1F4B3F',
      color: '#fff', weight: 2, fillOpacity: 0.9
    });
    marker.bindPopup(buildDoiPopupHtml(d, s));
    marker.on('mouseover', function(){ this.openPopup(); });
    marker.on('mouseout', function(){ this.closePopup(); });
    marker.addTo(mapMarkersLayer);
  });
}

async function renderMapTab(container, fruitFilter){
  if(mapInstance){ mapInstance.remove(); mapInstance = null; mapMarkersLayer = null; }

  container.innerHTML = `<div class="card"><div id="map"></div><p class="muted" style="margin-top:10px;">จุดสีแดง = มีรายงานภัยพิบัติที่ยังไม่ได้รับทราบ${fruitFilter!=='all' ? ` (เฉพาะ${fruitFilter} หรือกระทบทั้งดอย)` : ''} &nbsp;•&nbsp; จุดสีเขียว = ปกติ &nbsp;•&nbsp; เอาเมาส์ไปวางที่จุดเพื่อดูรายละเอียด — แผนที่จะอัปเดตอัตโนมัติเมื่อมีข้อมูลใหม่เข้ามา</p></div>`;

  mapInstance = L.map('map').setView([18.7, 99.0], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(mapInstance);
  mapMarkersLayer = L.layerGroup().addTo(mapInstance);

  await refreshMapMarkers(fruitFilter);

  teardownMapRealtime();
  mapRealtimeChannel = sb.channel('map-live-updates')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'disaster_reports' }, () => refreshMapMarkers(fruitFilter))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'growth_reports' }, () => refreshMapMarkers(fruitFilter))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'seasons' }, () => refreshMapMarkers(fruitFilter))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'weekly_shipments' }, () => refreshMapMarkers(fruitFilter))
    .subscribe();
}

  const { data: growth } = await sb.from('growth_reports').select('*, fruit_types(name), doi(name)').order('created_at', { ascending: false });
  const { data: seasonsRaw } = await sb.from('seasons').select('*, fruit_types(name), doi(name), weekly_shipments(quantity, week_start_date)').eq('status','open');
  const seasons = (seasonsRaw||[]).filter(s =>
    (filters.doiId === 'all' || String(s.doi_id) === String(filters.doiId)) &&
    (filters.fruit === 'all' || s.fruit_types.name === filters.fruit) &&
    (filters.variety === 'all' || (s.variety_name || '') === filters.variety)
  );

  // latest growth status per doi+fruit
  const latestGrowth = {};
  (growth||[]).forEach(g => {
    const key = `${g.doi_id}-${g.fruit_type_id}`;
    if(!latestGrowth[key]) latestGrowth[key] = g;
  });

  const rows = seasons.map(s => {
    const key = `${s.doi_id}-${s.fruit_type_id}`;
    const g = latestGrowth[key];
    const thisWeekTotal = (s.weekly_shipments||[])
      .filter(w => {
        const d = new Date(w.week_start_date);
        const now = new Date();
        const diffDays = (now - d) / (1000*60*60*24);
        return diffDays >= 0 && diffDays <= 7;
      })
      .reduce((sum,w)=>sum+Number(w.quantity),0);
    const totalShipped = (s.weekly_shipments||[]).reduce((sum,w)=>sum+Number(w.quantity),0);
    return `<tr>
      <td>${s.doi.name}</td>
      <td>${s.fruit_types.name}${s.variety_name ? ` (${s.variety_name})` : ''}</td>
      <td>${g ? `<span class="badge badge-green">${g.status}</span>` : '<span class="muted">ยังไม่มีรายงาน</span>'}</td>
      <td>${s.estimated_yield ? Number(s.estimated_yield).toLocaleString()+' กก.' : '—'}</td>
      <td>${totalShipped.toLocaleString()} กก.</td>
      <td>${thisWeekTotal.toLocaleString()} กก.</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="card">
      <h3>ตัวกรองตารางรายดอย</h3>
      <div class="grid-2">
        <div class="field"><label>ดอย</label>${doiSearchFieldHtml('tableFilterDoi', filters.doiId, { includeAll: true })}</div>
        <div class="field"><label>ชนิดพืช</label><select id="tableFilterFruit">${fruitOptionsHtml}</select></div>

      <table>

        <tbody>${rows || '<tr><td colspan="6" class="muted">ไม่มีข้อมูลตรงกับตัวกรองนี้</td></tr>'}</tbody>

/* ดึงข้อมูลฤดูกาลตามตัวกรอง (ดอย/ชนิดพืช/พันธุ์) แล้วรวมยอดตามปีงบประมาณ
   ใช้ร่วมกันทั้งกราฟที่แสดงในแอปและกราฟที่ฝังในรายงาน PDF เพื่อให้ตัวเลขตรงกันเสมอ */
async function fetchFilteredSeasonsForChart(filters){
  const { data: seasonsRaw } = await sb.from('seasons').select('*, doi(name), fruit_types(name), weekly_shipments(quantity)');
  const seasons = (seasonsRaw||[]).filter(s =>
    (filters.doiId === 'all' || String(s.doi_id) === String(filters.doiId)) &&
    (filters.fruit === 'all' || s.fruit_types.name === filters.fruit) &&
    (filters.variety === 'all' || (s.variety_name || '') === filters.variety)
  );
  const byYear = {};
  seasons.forEach(s => {
    const key = s.year_label;
    if(!byYear[key]) byYear[key] = { estimated: 0, actual: 0 };
    byYear[key].estimated += Number(s.estimated_yield || 0);
    byYear[key].actual += (s.weekly_shipments||[]).reduce((sum,w)=>sum+Number(w.quantity),0);
  });
  const labels = Object.keys(byYear).sort((a,b) => Number(a) - Number(b));
  const estimatedData = labels.map(l => byYear[l].estimated);
  const actualData = labels.map(l => byYear[l].actual);
  return { labels, estimatedData, actualData, matchedSeasonCount: seasons.length };
}

    const { error } = await sb.from('doi').insert({ name, province: province || null, latitude, longitude });

    if(error){
      document.getElementById('doiMsg').innerHTML = `<div class="msg msg-error">${error.message}</div>`;
      return;
    }
    await loadDoiList();
    renderDoiManageTab(container);
  };

  container.querySelectorAll('button[data-save-coords]').forEach(btn => {
    btn.onclick = async () => {
      const doiId = btn.dataset.saveCoords;
      const latInput = container.querySelector(`input[data-lat-for="${doiId}"]`);
      const lngInput = container.querySelector(`input[data-lng-for="${doiId}"]`);
      const latitude = latInput.value !== '' ? parseFloat(latInput.value) : null;
      const longitude = lngInput.value !== '' ? parseFloat(lngInput.value) : null;

      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      const { error } = await sb.from('doi').update({ latitude, longitude }).eq('id', doiId);
      btn.disabled = false; btn.textContent = 'บันทึกพิกัด';
      if(error){
        document.getElementById('doiMsg').innerHTML = `<div class="msg msg-error">${error.message}</div>`;
        return;
      }
      await loadDoiList();
      document.getElementById('doiMsg').innerHTML = `<div class="msg msg-ok">บันทึกพิกัดเรียบร้อย</div>`;
    };
  });
}

/* ---- ส่วนย่อย: สถานะการส่งข้อมูล — ส่วนกลางดูได้ว่าดอยไหนส่งยอดสัปดาห์นี้แล้ว ดอยไหนยังไม่ส่ง ---- */
async function renderSubmissionStatusSection(contentEl){
  contentEl.innerHTML = `<div class="card"><div class="empty">กำลังโหลด...</div></div>`;

  const thisWeek = getLastTuesdayISO();

  const { data: openSeasons } = await sb.from('seasons')
    .select('id, doi_id, year_label, variety_name, doi(name), fruit_types(name)')
    .eq('status', 'open')
    .order('doi_id');

  const openSeasonIds = (openSeasons||[]).map(s => s.id);
  const { data: thisWeekShipments } = await sb.from('weekly_shipments')
    .select('season_id, created_at, profiles!reported_by(full_name)')
    .eq('week_start_date', thisWeek)
    .in('season_id', openSeasonIds.length ? openSeasonIds : [0]);

  const submittedBySeasonId = {};
  (thisWeekShipments||[]).forEach(w => { submittedBySeasonId[w.season_id] = w; });

  const totalSeasons = (openSeasons||[]).length;
  const submittedCount = (openSeasons||[]).filter(s => submittedBySeasonId[s.id]).length;
  const notSubmittedCount = totalSeasons - submittedCount;

  contentEl.innerHTML = `
    <div class="card">
      <h3>สถานะยอดส่งรายสัปดาห์นี้ (เริ่ม ${thisWeek}) — ทุกดอย</h3>
      <div class="rpt-stats" style="margin:10px 0;">
        <div class="rpt-stat"><div class="num">${totalSeasons}</div><div class="lbl">ฤดูกาลที่กำลังดำเนินการทั้งหมด</div></div>
        <div class="rpt-stat"><div class="num">${submittedCount}</div><div class="lbl">ส่งแล้ว</div></div>
        <div class="rpt-stat"><div class="num">${notSubmittedCount}</div><div class="lbl">ยังไม่ส่ง</div></div>
      </div>
      <table>
        <thead><tr><th>ดอย</th><th>ชนิดพืช / พันธุ์</th><th>ปีงบประมาณ</th><th>สถานะ</th><th>ผู้ส่ง</th><th>เวลาที่ส่ง</th></tr></thead>
        <tbody>
          ${(openSeasons||[]).map(s => {
            const sub = submittedBySeasonId[s.id];
            return `<tr>
              <td>${s.doi.name}</td>
              <td>${s.fruit_types.name}${s.variety_name ? ` (${s.variety_name})` : ''}</td>
              <td>${s.year_label}</td>
              <td>${sub ? '<span class="badge badge-green">ส่งแล้ว</span>' : '<span class="badge badge-clay">ยังไม่ส่ง</span>'}</td>
              <td class="muted">${sub && sub.profiles ? sub.profiles.full_name : '—'}</td>
              <td class="muted">${sub ? new Date(sub.created_at).toLocaleString('th-TH') : '—'}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="6" class="muted">ยังไม่มีฤดูกาลที่เปิดอยู่ในระบบ</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
}

/* ============================================================
   รายงานสำหรับพิมพ์ / ส่งให้หน่วยงานอื่น (ฝ่ายวิจัย)
   ============================================================ */
async function generateReport(fruitFilter){
  const btn = document.getElementById('genReportBtn');
  if(btn){ btn.disabled = true; btn.textContent = 'กำลังสร้างรายงาน...'; }

  const [{ data: seasonsRaw }, { data: growth }, { data: disasters }] = await Promise.all([
    sb.from('seasons').select('*, fruit_types(name), doi(name), weekly_shipments(quantity, week_start_date)').eq('status','open'),
    sb.from('growth_reports').select('*, fruit_types(name), doi(name)').order('created_at', { ascending: false }),
    sb.from('disaster_reports').select('*, fruit_types(name), doi(name)').order('created_at', { ascending: false })
  ]);

  const chartFilters = state.centralChartFilters;
  const chartData = await fetchFilteredSeasonsForChart(chartFilters);
  const chartFilterDoiName = chartFilters.doiId === 'all' ? 'ทุกดอย' : (state.doiList.find(d => String(d.id) === String(chartFilters.doiId)) || {}).name || 'ทุกดอย';
  const chartFilterDesc = `${chartFilterDoiName} • ${chartFilters.fruit === 'all' ? 'ทุกชนิดพืช' : chartFilters.fruit} • ${chartFilters.variety === 'all' ? 'ทุกพันธุ์' : chartFilters.variety}`;

  const seasons = (seasonsRaw||[]).filter(s => fruitFilter === 'all' || s.fruit_types.name === fruitFilter);
  const disasterList = (disasters||[]).filter(d => fruitFilter === 'all' || d.fruit_type_id === null || (d.fruit_types && d.fruit_types.name === fruitFilter));

  const latestGrowth = {};
  (growth||[]).forEach(g => {
    const key = `${g.doi_id}-${g.fruit_type_id}`;
    if(!latestGrowth[key]) latestGrowth[key] = g;
  });

  const doiCovered = new Set(seasons.map(s => s.doi_id));
  const newDisasterCount = disasterList.filter(d => d.status === 'new').length;

  const tableRows = seasons.map(s => {
    const key = `${s.doi_id}-${s.fruit_type_id}`;
    const g = latestGrowth[key];
    const totalShipped = (s.weekly_shipments||[]).reduce((sum,w)=>sum+Number(w.quantity),0);
    return `<tr>
      <td>${s.doi.name}</td>
      <td>${s.fruit_types.name}${s.variety_name ? ` (${s.variety_name})` : ''}</td>
      <td>${s.year_label}</td>
      <td>${g ? g.status : '—'}</td>
      <td style="text-align:right;">${s.estimated_yield ? Number(s.estimated_yield).toLocaleString() : '—'}</td>
      <td style="text-align:right;">${totalShipped.toLocaleString()}</td>
    </tr>`;
  }).join('');

  const disasterRows = disasterList.map(d => `<tr>
      <td>${new Date(d.created_at).toLocaleDateString('th-TH')}</td>
      <td>${d.doi.name}</td>
      <td>${d.disaster_type}</td>
      <td>${d.affected_area}</td>
      <td style="text-align:right;">${d.damage_percent!=null ? d.damage_percent+'%' : '—'}</td>
      <td>${d.status==='new'?'ใหม่':(d.status==='acknowledged'?'รับทราบแล้ว':'แก้ไขแล้ว')}</td>
    </tr>`).join('');

  const now = new Date();
  const reportEl = document.getElementById('printReport');
  reportEl.innerHTML = `
    <div class="rpt-header">
      <h1>รายงานสรุปสถานการณ์ผลผลิตไม้ผล</h1>
      <div class="rpt-meta">โครงการหลวง ${fruitFilter !== 'all' ? `— เฉพาะ ${fruitFilter}` : '— ทุกชนิดผลไม้'}</div>
      <div class="rpt-meta">ออกรายงานวันที่ ${now.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' })} เวลา ${now.toLocaleTimeString('th-TH')}</div>
      <div class="rpt-meta">ผู้ออกรายงาน: ${state.profile ? state.profile.full_name : ''}</div>
    </div>

    <div class="rpt-section">
      <h2>สรุปภาพรวม</h2>
      <div class="rpt-stats">
        <div class="rpt-stat"><div class="num">${state.doiList.length}</div><div class="lbl">ดอยทั้งหมด</div></div>
        <div class="rpt-stat"><div class="num">${doiCovered.size}</div><div class="lbl">ดอยที่มีข้อมูล${fruitFilter!=='all'?'ของชนิดนี้':''}</div></div>
        <div class="rpt-stat"><div class="num">${seasons.length}</div><div class="lbl">ฤดูกาลที่กำลังดำเนินการ</div></div>
        <div class="rpt-stat"><div class="num">${newDisasterCount}</div><div class="lbl">รายงานภัยพิบัติใหม่</div></div>
      </div>
    </div>

    <div class="rpt-section">
      <h2>กราฟสรุปแนวโน้มผลผลิต</h2>
      <div class="rpt-meta">ตัวกรองที่ใช้: ${chartFilterDesc}</div>
      <canvas id="reportChart" width="700" height="300" style="max-width:100%; margin-top:10px;"></canvas>
      <table style="width:100%; border-collapse:collapse; margin-top:14px;">
        <thead><tr style="border-bottom:1px solid #999;">
          <th style="text-align:left; padding:5px;">ปีงบประมาณ</th>
          <th style="text-align:right; padding:5px;">ประมาณการ (กก.)</th>
          <th style="text-align:right; padding:5px;">ส่งจริงสะสม (กก.)</th>
          <th style="text-align:right; padding:5px;">% เทียบกับประมาณการ</th>
        </tr></thead>
        <tbody>
          ${chartData.labels.map((y, i) => {
            const est = chartData.estimatedData[i];
            const act = chartData.actualData[i];
            const pct = est > 0 ? ((act / est) * 100).toFixed(1) + '%' : '—';
            return `<tr>
              <td>ปีงบประมาณ ${y}</td>
              <td style="text-align:right;">${est.toLocaleString()}</td>
              <td style="text-align:right;">${act.toLocaleString()}</td>
              <td style="text-align:right;">${pct}</td>
            </tr>`;
          }).join('') || '<tr><td colspan="4" style="padding:8px;">ไม่มีข้อมูลตรงกับตัวกรองนี้</td></tr>'}
        </tbody>
      </table>
    </div>

    <div class="rpt-section">
      <h2>สถานะรายดอย (เฉพาะฤดูกาลที่กำลังดำเนินการ)</h2>
      <table style="width:100%; border-collapse:collapse;">
        <thead><tr style="border-bottom:1px solid #999;">
          <th style="text-align:left; padding:5px;">ดอย</th>
          <th style="text-align:left; padding:5px;">ผลไม้</th>
          <th style="text-align:left; padding:5px;">ปีงบประมาณ</th>
          <th style="text-align:left; padding:5px;">สถานะการเจริญเติบโตล่าสุด</th>
          <th style="text-align:right; padding:5px;">ประมาณการ (กก.)</th>
          <th style="text-align:right; padding:5px;">ส่งแล้วรวม (กก.)</th>
        </tr></thead>
        <tbody>${tableRows || '<tr><td colspan="6" style="padding:8px;">ไม่มีข้อมูล</td></tr>'}</tbody>
      </table>
    </div>

    <div class="rpt-section">
      <h2>รายงานภัยพิบัติทางธรรมชาติ</h2>
      <table style="width:100%; border-collapse:collapse;">
        <thead><tr style="border-bottom:1px solid #999;">
          <th style="text-align:left; padding:5px;">วันที่</th>
          <th style="text-align:left; padding:5px;">ดอย</th>
          <th style="text-align:left; padding:5px;">ประเภท</th>
          <th style="text-align:left; padding:5px;">พื้นที่กระทบ</th>
          <th style="text-align:right; padding:5px;">เสียหาย</th>
          <th style="text-align:left; padding:5px;">สถานะ</th>
        </tr></thead>
        <tbody>${disasterRows || '<tr><td colspan="6" style="padding:8px;">ไม่มีรายงานภัยพิบัติ</td></tr>'}</tbody>
      </table>
    </div>
  `;

  if(btn){ btn.disabled = false; btn.textContent = 'สร้างรายงาน (พิมพ์ / PDF)'; }

  const reportChartCanvas = document.getElementById('reportChart');
  if(reportChartCanvas && chartData.labels.length > 0){
    new Chart(reportChartCanvas, {
      type: 'bar',
      data: {
        labels: chartData.labels.map(y => `ปีงบประมาณ ${y}`),
        datasets: [
          { label: 'ประมาณการ (กก.)', data: chartData.estimatedData, backgroundColor: '#D99A2B' },
          { label: 'ส่งจริงสะสม (กก.)', data: chartData.actualData, backgroundColor: '#1F4B3F' }
        ]
      },
      options: {
        responsive: false,
        animation: false,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // เว้นเวลาสั้นๆ ให้กราฟวาดเสร็จก่อนเปิดหน้าต่างพิมพ์
  await new Promise(resolve => setTimeout(resolve, 150));
  window.print();
}

/* ------------------------------------------------------------ */
boot();
</script>
</body>
</html>
